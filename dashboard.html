<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>去哪儿 AI 潜力城市运营驾驶舱</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.1/dist/echarts.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#1f2937;font-size:14px}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:14px 0}
.header-inner{max-width:1360px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between}
.header-left h1{font-size:18px;font-weight:700;color:#111827}
.header-left .sub{font-size:12px;color:#6b7280;margin-top:1px}
.header-right{display:flex;gap:6px}
.header-right a{text-decoration:none;font-size:13px;padding:6px 16px;border-radius:20px;color:#6b7280;font-weight:500}
.header-right a.active{background:#eff6ff;color:#2563eb}
.container{max-width:1360px;margin:0 auto;padding:20px 24px}
.alert{background:#fff7ed;border:1px solid #fed7aa;border-radius:10px;padding:14px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start}
.alert-icon{font-size:22px;line-height:1}
.alert h3{font-size:14px;font-weight:600;color:#9a3412}
.alert p{font-size:13px;color:#c2410c;margin-top:3px}
.columns{display:grid;grid-template-columns:320px 1fr;gap:20px}
.panel{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.panel-title{font-size:13px;font-weight:600;color:#374151;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.city-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;border:1px solid transparent;margin-bottom:1px;transition:all .1s}
.city-row:hover{background:#f9fafb}
.city-row.active{background:#eff6ff;border-color:#bfdbfe}
.city-rank{width:22px;height:22px;border-radius:999px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.city-rank.t3{background:#3b82f6}
.city-rank.other{background:#d1d5db}
.city-name{font-weight:500;font-size:13px;flex:1}
.city-score{font-weight:700;font-size:14px}
.s-green{color:#16a34a}
.s-yellow{color:#ca8a04}
.badge-warn{font-size:10px;background:#fff7ed;color:#ea580c;padding:1px 7px;border-radius:999px;font-weight:600}
.badge-blue{font-size:10px;background:#eff6ff;color:#2563eb;padding:1px 7px;border-radius:999px;font-weight:600}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.metric{text-align:center;padding:12px 6px;border-radius:8px}
.metric .ml{font-size:11px;color:#6b7280}
.metric .mv{font-size:20px;font-weight:700;margin-top:2px}
.metric .msub{font-size:11px;color:#9ca3af;margin-top:1px}
.bg-blue{background:#eff6ff}
.bg-green{background:#f0fdf4}
.bg-purple{background:#faf5ff}
.bg-orange{background:#fff7ed}
.ops-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:12px 0}
.ops-card{padding:12px;border-radius:8px}
.ops-card .ol{font-size:12px;font-weight:600}
.ops-card .os{font-size:20px;color:#eab308;margin-top:2px}
.ops-card .od{font-size:11px;color:#6b7280;margin-top:2px}
.chart-wrap{height:180px;margin-top:4px}
.signals{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.signal{background:#f9fafb;padding:8px 10px;border-radius:6px;display:flex;justify-content:space-between;font-size:12px}
.signal .sl{color:#6b7280}
.signal .sv{font-weight:600}
.signal .up{color:#16a34a}
.signal .down{color:#ef4444}
.timeline{background:#f9fafb;border-radius:8px;padding:12px 14px;margin-top:10px}
.tl-row{display:flex;align-items:center;gap:8px;padding:5px 0}
.tl-dot{width:8px;height:8px;border-radius:999px;flex-shrink:0}
.tl-dot.current{background:#3b82f6}
.tl-dot.upcoming{background:#d1d5db}
.tl-dot.warn{background:#ea580c}
.tl-label{font-size:12px;color:#6b7280;flex:1}
.tl-action{font-size:12px;font-weight:500}
.tl-line{width:1px;height:12px;background:#e5e7eb;margin-left:3.5px}
.ai-explanation{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:12px;margin-top:8px}
.ai-explanation .ai-title{font-size:12px;font-weight:600;color:#15803d;margin-bottom:6px}
.ai-item{display:flex;align-items:center;gap:6px;font-size:12px;padding:3px 0}
.ai-item .check{color:#16a34a;font-weight:700}
.summary-text{font-size:12px;color:#6b7280;background:#f9fafb;padding:10px 12px;border-radius:6px;margin-top:8px;line-height:1.6}
.split-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:12px}
.split-2 .col{padding:12px;border-radius:8px}
.split-2 .col h4{font-size:12px;font-weight:600;color:#374151;margin-bottom:8px}
.action-list{list-style:none}
.action-list li{font-size:12px;padding:4px 0;display:flex;align-items:center;gap:5px}
.action-list .star{color:#eab308}
.detail-col{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:16px}
.detail-chart{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
.detail-chart h4{font-size:13px;font-weight:600;margin-bottom:8px}
.tab-row{display:flex;gap:0;background:#fff;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:20px}
.tab-row button{padding:9px 20px;border:none;background:#fff;font-size:13px;cursor:pointer;border-right:1px solid #e5e7eb;flex:1}
.tab-row button:last-child{border-right:none}
.tab-row button.active{background:#3b82f6;color:#fff;font-weight:600}
.back{text-decoration:none;color:#6b7280;font-size:13px;margin-right:12px}
.back:hover{color:#374151}
.sel-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.sel-row select{padding:7px 10px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;flex:1}
.vs-block{text-align:center;font-size:24px;font-weight:700;color:#3b82f6;min-width:70px}
.vs-block .sim-tag{font-size:11px;color:#2563eb;background:#eff6ff;padding:3px 10px;border-radius:999px;display:block;margin-top:4px}
.comp-charts{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.comp-chart-box{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:14px}
.comp-chart-box h4{font-size:13px;font-weight:600;margin-bottom:8px}
.comp-chart-box .chart{height:200px}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;text-align:center}
.stat-card .snum{font-size:28px;font-weight:700;margin-top:4px}
.action-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.action-card{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.action-card .ach{font-size:14px;font-weight:600;margin-bottom:10px}
.ar{display:flex;justify-content:space-between;align-items:center;padding:6px 0}
.ar+.ar{border-top:1px solid #f3f4f6}
.ar .an{font-size:13px;font-weight:500}
.ar .ad{font-size:11px;color:#9ca3af;margin-top:1px}
.action-summary{font-size:12px;color:#6b7280;background:#f9fafb;padding:8px 10px;border-radius:6px;margin-top:8px;line-height:1.6}
</style>
</head>

let DATA = MOCK_DATA;
async function loadData(){try{let r=await fetch('/prediction.json');if(r.ok){let j=await r.json();if(j&&j.length>0)DATA=j}}catch(e){}render()}
function render(){const p=new URLSearchParams(location.hash.slice(1)),v=p.get('view')||'dashboard';if(v=='dashboard')renderDashboard();else if(v=='detail')renderDetail(p.get('city')||DATA[0].city);else if(v=='compare')renderCompare();else if(v=='operation')renderOperation()}
window.addEventListener('hashchange',function(){let p=new URLSearchParams(location.hash.slice(1)),v=p.get('view')||'dashboard';if(v=='dashboard')renderDashboard();else if(v=='detail')renderDetail(p.get('city')||DATA[0].city);else if(v=='compare')renderCompare();else if(v=='operation')renderOperation()});loadData()
function nav(v,e){location.hash='view='+v+(e?'&'+e:'')}
function hdr(a){return '<header><div class="header-inner"><div class="header-left"><h1>去哪儿 AI 潜力城市运营驾驶舱</h1><div class="sub">AI预测 × 运营决策支持平台</div></div><div style="font-size:10px;color:#9ca3af;border:1px solid #e5e7eb;border-radius:4px;padding:2px 8px;margin-left:auto">Prophet v1.1</div><div class="header-right">'+
  ['dashboard','compare','operation'].map(x=>'<a href="#" onclick="nav(\''+x+'\')" class="'+(a==x?'active':'')+'">'+(x=='dashboard'?'首页':x=='compare'?'城市对比':'运营建议')+'</a>').join('')+'</div></div></header>'}
function sc(s){return s>=80?'s-green':s>=60?'s-yellow':''}
function stars(n){let r=Math.round(n/20);return '<span style="color:#eab308;font-size:16px">'+'★'.repeat(r)+'☆'.repeat(5-r)+'</span>'}
function tchart(id,data,ht){
  setTimeout(()=>{
    const el=document.getElementById(id);if(!el)return
    const c=echarts.init(el)
    c.setOption({
      grid:{left:36,right:12,top:12,bottom:20},
      xAxis:{type:'category',data:Array.from({length:data.length},(_,i)=>'D+'+(i+1)),axisLabel:{fontSize:10,color:'#9ca3af'},axisLine:{show:false},axisTick:{show:false}},
      yAxis:{type:'value',splitLine:{lineStyle:{color:'#f3f4f6'}},axisLabel:{fontSize:10,color:'#9ca3af'}},
      series:[{data,type:'line',smooth:true,symbol:'circle',symbolSize:5,lineStyle:{width:2,color:'#3b82f6'},areaStyle:{color:{type:'linear',x:0,y:0,x2:0,y2:1,colorStops:[{offset:0,color:'rgba(59,130,246,0.15)'},{offset:1,color:'rgba(59,130,246,0.01)'}]}},itemStyle:{color:'#3b82f6'}}],
      tooltip:{trigger:'axis'}
    })
  },50)
}

function renderDashboard(){
  const warns=DATA.filter(d=>d.warn),top=DATA.slice(0,10)
  let sel=DATA.find(d=>d.city===new URLSearchParams(location.hash.slice(1)).get('sel'))||top[0]
  const hasSel=top.findIndex(d=>d.city===sel.city)
  document.getElementById('app').innerHTML=hdr('dashboard')+
  '<div class="container">'+
    (warns.length?'<div class="alert"><div class="alert-icon">🔥</div><div><h3>今日预警</h3><p>'+warns.length+' 座城市进入预热窗口：'+warns.map(d=>d.city).join('、')+'，预计未来7天爆发概率较高，建议立即启动资源配置。</p></div></div>':'')+
    '<div class="columns">'+
      '<div class="panel"><div class="panel-title">📊 Top 10 潜力城市</div>'+
        top.map((d,i)=>'<div class="city-row'+(sel.city===d.city?' active':'')+'" onclick="nav(\'dashboard\',\'sel='+d.city+'\');renderDashboard()"><span class="city-rank '+(i<3?'t3':'other')+'">'+(i+1)+'</span><span class="city-name">'+d.city+'</span>'+(d.warn?'<span class="badge-warn">预警</span>':'')+'<span class="city-score '+sc(d.score)+'">'+d.score+'%</span></div>').join('')+
      '</div>'+
      '<div><div class="panel"><div class="panel-title">📈 '+sel.city+' · 热度趋势预测</div><div id="cd1" class="chart-wrap"></div></div>'+
        '<div class="ai-explanation"><div class="ai-title">🔍 AI判断依据</div>${sel.confidence?'<div style="font-size:10px;color:#6b7280;margin-bottom:2px">可信度: <strong>'+sel.confidence+'%</strong></div>':''}'+
          sel.signals.map(s=>'<div class="ai-item"><span class="check">✓</span><span>'+s.l+' <strong class="'+(s.c==='up'?'s-green':'')+'">'+s.v+'</strong></span></div>').join('')+(renderFactors(sel))+
        '</div>'+
        '<div class="panel" style="margin-top:12px"><div class="panel-title">🎯 运营建议 · '+sel.city+'</div>'+
          '<div class="ops-grid">'+
            '<div style="background:#f0fdf4" class="ops-card"><div class="ol" style="color:#15803d">🏨 酒店</div><div>'+stars(sel.hotel)+'</div><div class="od">'+(sel.hotel>=75?'建议提前锁房，预留库存':'暂不优先')+'</div></div>'+
            '<div style="background:#faf5ff" class="ops-card"><div class="ol" style="color:#7e22ce">📢 营销</div><div>'+stars(sel.mkt)+'</div><div class="od">'+(sel.mkt>=80?'建议上线专题、达人合作':'保持日常更新')+'</div></div>'+
            '<div style="background:#fff7ed" class="ops-card"><div class="ol" style="color:#9a3412">🚄 运力</div><div>'+stars(sel.traffic)+'</div><div class="od">'+(sel.traffic>=70?'建议提前协调运力':'持续观察')+'</div></div>'+
          '</div>'+
        '</div>'+
        '<div class="panel" style="margin-top:12px"><div class="panel-title">⏱ 预计时间轴 · '+sel.city+'</div>'+
          '<div class="timeline">'+
            '<div class="tl-row"><div class="tl-dot current"></div><span class="tl-label">今天 · AI预警</span><span class="tl-action" style="color:#2563eb;font-weight:600">开始部署</span></div><div class="tl-line"></div>'+
            '<div class="tl-row"><div class="tl-dot upcoming"></div><span class="tl-label">'+(sel.days||3)+'天后 · 进入传播窗口</span><span class="tl-action" style="color:#ca8a04">上架专题页</span></div><div class="tl-line"></div>'+
            '<div class="tl-row"><div class="tl-dot upcoming"></div><span class="tl-label">'+(Math.min(7,sel.days+3))+'天后 · 热度上升</span><span class="tl-action" style="color:#ca8a04">达人合作投放</span></div><div class="tl-line"></div>'+
            '<div class="tl-row"><div class="tl-dot upcoming"></div><span class="tl-label">'+(sel.days+7)+'天后 · 预计爆发</span><span class="tl-action" style="color:#16a34a;font-weight:600">订单转化</span></div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="split-2" style="margin-top:20px">'+
      '<div class="col" style="background:#eff6ff"><h4>🔎 右侧提示</h4><ul class="action-list"><li>选择左侧城市查看详情</li><li>AI判断依据实时更新</li><li>时间轴为预测路径</li></ul></div>'+
      '<div class="col" style="background:#fef2f2"><h4>⚠ 注意</h4><ul class="action-list"><li>数据为AI时序预测结果</li><li>实际需求请以波动为准</li><li>建议本周完成首批采购</li></ul></div>'+
    '</div></div>'
  tchart('cd1',sel.trend)
}

function renderDetail(cn){
  const d=DATA.find(x=>x.city===cn)||DATA[0]
  document.getElementById('app').innerHTML=hdr('')+
  '<div class="container">'+
    '<div style="margin-bottom:14px"><a href="#" class="back" onclick="nav(\'dashboard\')">← 驾驶舱</a><span style="font-size:18px;font-weight:700">'+d.city+' 详情</span>'+(d.warn?' <span style="font-size:11px;background:#fff7ed;color:#ea580c;padding:2px 10px;border-radius:999px;font-weight:600">🔥 预警中</span>':'')+'</div>'+
    '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:20px">'+
      '<div class="metric bg-blue"><div class="ml">爆发概率</div><div class="mv '+sc(d.score)+'">'+d.score+'%</div></div>'+
      '<div class="metric bg-green"><div class="ml">酒店供给</div><div class="mv" style="color:#374151">'+d.hotel+'</div></div>'+
      '<div class="metric bg-purple"><div class="ml">交通运力</div><div class="mv" style="color:#374151">'+d.traffic+'</div></div>'+
      '<div class="metric bg-orange"><div class="ml">营销建议</div><div class="mv" style="color:#9333ea">'+stars(d.mkt)+'</div></div>'+
      '<div class="metric bg-blue"><div class="ml">相似城市</div><div class="mv" style="font-size:18px;color:#374151">'+d.ref+'</div><div class="msub">'+d.sim+'% 相似</div></div>'+
    '</div>'+
    '<div class="detail-col">'+
      '<div class="detail-chart"><h4>热度趋势预测</h4><div class="chart-wrap" style="height:260px" id="dd1"></div></div>'+
      '<div class="detail-chart"><h4>百度搜索指数</h4><div class="chart-wrap" style="height:260px" id="dd2"></div></div>'+
    '</div>'+
    '<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-top:20px">'+
      '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px"><div class="panel-title">🤖 AI 综合分析</div><div class="summary-text">'+d.summary+'</div>'+
        '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px">'+
          '<div style="background:#f0fdf4;padding:10px;border-radius:6px"><div style="font-size:11px;font-weight:600;color:#15803d">🏨 酒店采购</div><div style="font-size:12px;color:#16a34a;margin-top:2px">'+(d.hotel>=75?'建议提前签约，锁定库存':'暂不推荐')+'</div></div>'+
          '<div style="background:#faf5ff;padding:10px;border-radius:6px"><div style="font-size:11px;font-weight:600;color:#7e22ce">📢 营销投放</div><div style="font-size:12px;color:#9333ea;margin-top:2px">'+(d.mkt>=80?'建议上线专题':'持续观察')+'</div></div>'+
          '<div style="background:#fff7ed;padding:10px;border-radius:6px"><div style="font-size:11px;font-weight:600;color:#9a3412">🚄 运力协调</div><div style="font-size:12px;color:#c2410c;margin-top:2px">'+(d.traffic>=70?'建议增加班次':'关注铁路')+'</div></div>'+
        '</div></div>'+
      '<div class="ai-explanation"><div class="ai-title">🔍 AI判断依据</div>${sel.confidence?'<div style="font-size:10px;color:#6b7280;margin-bottom:2px">可信度: <strong>'+sel.confidence+'%</strong></div>':''}'+
        d.signals.map(s=>'<div class="ai-item"><span class="check">✓</span><span>'+s.l+' <strong class="'+(s.c==='up'?'s-green':'')+'">'+s.v+'</strong></span></div>').join('')+'</div>'+
    '</div></div>'
  tchart('dd1',d.trend);tchart('dd2',d.bsi)
}

function renderCompare(){
  document.getElementById('app').innerHTML=hdr('compare')+
  '<div class="container">'+
    '<div class="sel-row">'+
      '<select id="cs1" onchange="renderCompare2()">'+DATA.map(d=>'<option value="'+d.city+'">'+d.city+'</option>').join('')+'</select>'+
      '<div class="vs-block">VS<div class="sim-tag" id="simT">89% 相似</div></div>'+
      '<select id="cs2" onchange="renderCompare2()">'+[...new Set(DATA.map(d=>d.ref))].map(d=>'<option value="'+d+'">'+d+'（爆发前）</option>').join('')+'</select>'+
    '</div>'+
    '<div class="comp-charts">'+
      '<div class="comp-chart-box"><h4 id="cl1">候选城市 · 预测趋势</h4><div id="cc1" class="chart"></div></div>'+
      '<div class="comp-chart-box"><h4 id="cl2">参考城市 · 爆发前趋势</h4><div id="cc2" class="chart"></div></div>'+
    '</div>'+
    '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-top:16px"><div class="panel-title">📊 多维度评分对比</div><div style="display:grid;grid-template-columns:repeat(5,1fr);gap:10px" id="cg"></div></div>'+
  '</div>'
  renderCompare2()
}
function renderCompare2(){
  setTimeout(()=>{
    const v1=DATA.find(d=>d.city===document.getElementById('cs1').value)||DATA[0]
    const rn=document.getElementById('cs2').value
    const v2=DATA.find(d=>d.ref===rn)||DATA[0]
    document.getElementById('cl1').textContent=v1.city+' · 预测趋势';document.getElementById('cl2').textContent=rn+' · 爆发前趋势'
    document.getElementById('simT').textContent=v1.sim+'% 相似'
    tchart('cc1',v1.trend);tchart('cc2',v2.trend)
    document.getElementById('cg').innerHTML=[
      {l:'爆发概率',v1:v1.score,v2:v2.score},{l:'酒店供给',v1:v1.hotel,v2:v2.hotel},{l:'交通运力',v1:v1.traffic,v2:v2.traffic},
      {l:'营销潜力',v1:v1.mkt,v2:v2.mkt},{l:'曲线相似度',v1:v1.sim,v2:100}
    ].map(x=>'<div style="text-align:center;background:#f9fafb;padding:10px;border-radius:6px"><div style="font-size:11px;color:#6b7280;margin-bottom:6px">'+x.l+'</div><div style="display:flex;justify-content:center;gap:14px;align-items:center"><div><div style="font-size:16px;font-weight:700;color:#3b82f6">'+x.v1+'</div><div style="font-size:10px;color:#9ca3af">候选</div></div><span style="color:#d1d5db">|</span><div><div style="font-size:16px;font-weight:700;color:#ea580c">'+x.v2+'</div><div style="font-size:10px;color:#9ca3af">参考</div></div></div></div>').join('')
  },50)
}

function renderOperation(){
  const s=[...DATA].sort((a,b)=>b.score-a.score)
  document.getElementById('app').innerHTML=hdr('operation')+
  '<div class="container">'+
    '<div class="stats-row">'+
      '<div class="stat-card"><div style="font-size:12px;color:#6b7280">建议酒店采购</div><div class="snum" style="color:#16a34a">'+s.filter(d=>d.hotel>=75).length+'</div><div style="font-size:12px;color:#9ca3af">座城市</div></div>'+
      '<div class="stat-card"><div style="font-size:12px;color:#6b7280">建议营销投放</div><div class="snum" style="color:#9333ea">'+s.filter(d=>d.mkt>=80).length+'</div><div style="font-size:12px;color:#9ca3af">座城市</div></div>'+
      '<div class="stat-card"><div style="font-size:12px;color:#6b7280">建议运力协调</div><div class="snum" style="color:#ea580c">'+s.filter(d=>d.traffic>=70).length+'</div><div style="font-size:12px;color:#9ca3af">座城市</div></div>'+
    '</div>'+
    '<div class="action-cards">'+
      s.map(d=>'<div class="action-card"><div class="ach">'+(d.warn?'🔥 ':'')+d.city+'<span style="float:right;font-size:20px;color:#3b82f6;font-weight:700">'+d.score+'%</span></div>'+
        '<div class="ar"><div><div class="an">🏨 酒店采购</div><div class="ad">'+(d.hotel>=75?'建议提前签约，锁定库存':'暂不优先采购')+'</div></div>'+stars(d.hotel)+'</div>'+
        '<div class="ar"><div><div class="an">📢 营销投放</div><div class="ad">'+(d.mkt>=80?'建议上线专题、达人合作':'保持日常内容更新')+'</div></div>'+stars(d.mkt)+'</div>'+
        '<div class="ar"><div><div class="an">🚄 运力协调</div><div class="ad">'+(d.traffic>=70?'建议增加班次，协调资源':'持续关注')+'</div></div>'+stars(d.traffic)+'</div>'+
        '<div class="action-summary">'+d.summary+'</div></div>').join('')+
    '</div></div>'
}
</script>
